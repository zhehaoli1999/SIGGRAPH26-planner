<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGGRAPH 2026 — My Schedule Planner</title>
<style>
  :root{
    --ink:#12312e; --ink2:#3d5a56; --bg:#efe9df; --card:#ffffff; --line:#ddd2c0;
    --teal:#0e4f4a; --teal2:#156b64; --gold:#c9a227; --pin:#c9a227; --red:#b3402e;
    --shadow:0 1px 3px rgba(18,49,46,.08), 0 4px 14px rgba(18,49,46,.06);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.45}
  header{background:linear-gradient(135deg,#0b3f3a 0%, #156b64 100%); color:#f4efe6; padding:18px 16px 14px; position:sticky; top:0; z-index:50; box-shadow:var(--shadow)}
  .hwrap{max-width:980px; margin:0 auto}
  h1{font-size:19px; font-weight:700; letter-spacing:.2px}
  h1 .sub{font-weight:400; opacity:.85; font-size:13px; display:block; margin-top:2px}
  .toolbar{max-width:980px; margin:10px auto 0; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .tabs{display:flex; gap:6px; flex-wrap:wrap}
  .tab{border:1px solid rgba(244,239,230,.35); background:transparent; color:#f4efe6; border-radius:20px; padding:5px 13px; font-size:13.5px; cursor:pointer; white-space:nowrap}
  .tab.active{background:#f4efe6; color:var(--teal); font-weight:700; border-color:#f4efe6}
  .tab.agenda.active{background:var(--gold); border-color:var(--gold); color:#241c02}
  .controls{max-width:980px; margin:12px auto 4px; padding:0 16px; display:flex; gap:8px; flex-wrap:wrap}
  .controls input[type=search]{flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--card)}
  .controls select{padding:9px 10px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--card); color:var(--ink); max-width:230px}
  main{max-width:980px; margin:0 auto 80px; padding:0 16px}
  .daysec{margin-top:18px}
  .dayhead{font-size:15px; font-weight:800; color:var(--teal); text-transform:uppercase; letter-spacing:.6px; padding:6px 2px; border-bottom:2px solid var(--teal); display:flex; justify-content:space-between; align-items:baseline; position:sticky; top:118px; background:var(--bg); z-index:5}
  .dayhead small{font-weight:600; color:var(--ink2); text-transform:none; letter-spacing:0}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-top:10px; display:flex; gap:10px; box-shadow:var(--shadow); position:relative}
  .card.pinned{border-color:var(--gold); box-shadow:0 0 0 1.5px var(--gold), var(--shadow)}
  .tcol{flex:0 0 74px; font-size:12.5px; color:var(--ink2); font-variant-numeric:tabular-nums; padding-top:2px}
  .tcol b{display:block; color:var(--ink); font-size:13px}
  .mid{flex:1; min-width:0}
  .badge{display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; border-radius:5px; padding:2px 7px; margin-bottom:4px; color:#fff}
  .title{font-size:14.5px; font-weight:650; line-height:1.3}
  .who{font-size:12px; color:var(--ink2); margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .loc{font-size:12px; color:var(--teal2); margin-top:3px; font-weight:600}
  .acts{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:8px}
  .pinbtn{width:38px; height:38px; border-radius:50%; border:1.5px solid var(--line); background:#fff; font-size:19px; cursor:pointer; color:#b9ad97; display:flex; align-items:center; justify-content:center; transition:all .12s}
  .pinbtn.on{background:var(--gold); border-color:var(--gold); color:#241c02}
  .gcal{font-size:11px; color:var(--teal2); text-decoration:none; border:1px solid var(--line); border-radius:6px; padding:3px 6px; white-space:nowrap}
  .gcal:hover{background:#f2ede2}
  .conflict{font-size:11px; font-weight:700; color:var(--red); margin-top:4px}
.trange{display:flex; flex-direction:column; justify-content:center; gap:1px; width:200px}
.trlabel{font-size:11px; color:var(--ink2); font-weight:700}
.trlabel.active{color:var(--teal2)}
.trslider{position:relative; height:20px}
.trslider::before{content:""; position:absolute; left:0; right:0; top:8px; height:4px; background:var(--line); border-radius:2px}
.trfill{position:absolute; top:8px; height:4px; background:var(--teal2); border-radius:2px}
.trslider input[type=range]{position:absolute; left:0; top:0; width:100%; height:20px; margin:0; -webkit-appearance:none; appearance:none; background:none; pointer-events:none}
.trslider input[type=range]::-webkit-slider-runnable-track{background:transparent; height:20px}
.trslider input[type=range]::-moz-range-track{background:transparent; height:20px}
.trslider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:15px; height:15px; margin-top:2.5px; border-radius:50%; background:var(--teal2); border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.35); pointer-events:auto; cursor:pointer}
.trslider input[type=range]::-moz-range-thumb{width:11px; height:11px; border-radius:50%; background:var(--teal2); border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.35); pointer-events:auto; cursor:pointer}
.ovwrap{display:flex; gap:10px; overflow-x:auto; max-width:980px; margin:12px auto 0; padding:0 16px 12px; align-items:flex-start; -webkit-overflow-scrolling:touch}
.ovcol{flex:0 0 235px; background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
.ovhead{display:flex; justify-content:space-between; align-items:baseline; padding:9px 12px; background:#fbeee6; font-weight:800}
.ovhead span:first-child{color:#c14e2a; font-size:12px; letter-spacing:.8px}
.ovhead span:last-child{font-size:15px}
.ovitem{position:relative; padding:8px 30px 8px 12px; border-top:1px solid var(--line); cursor:pointer}
.ovitem:hover{background:var(--bg)}
.ovitem.pinned{box-shadow:inset 3px 0 0 var(--gold)}
.ovstar{position:absolute; right:9px; top:7px; cursor:pointer; color:var(--gold); font-size:14px}
.ovtime{font-size:11.5px; color:var(--ink2); font-variant-numeric:tabular-nums}
.ovtitle{font-size:13px; font-weight:600; line-height:1.3; margin-top:1px}
.ovkw{font-size:11px; color:var(--teal2); font-weight:700; margin-top:2px}
.card.flash{box-shadow:0 0 0 3px var(--teal2), var(--shadow); transition:box-shadow .3s}
.kwrow{max-width:980px; margin:6px auto 0; padding:0 16px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; font-size:12px}
.kwlabel{font-weight:800; color:var(--ink2); text-transform:uppercase; letter-spacing:.5px; font-size:10.5px}
.kwall{color:var(--ink2)}
.kwall a{cursor:pointer; color:var(--teal2); font-weight:700}
.kwall a:hover{text-decoration:underline}
.kwchip{display:inline-block; padding:4px 10px; margin:2px 2px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink2); cursor:pointer; user-select:none; font-size:12px; font-weight:600}
.kwchip.on{background:var(--ink); border-color:var(--ink); color:#fff}
.kwcount{margin-left:auto; color:var(--ink2); font-size:11.5px; white-space:nowrap}
.papers{margin-top:6px; font-size:12.5px}
.papers summary{cursor:pointer; color:var(--ink2); font-weight:600; user-select:none}
.papers summary:hover{color:var(--ink)}
.phit{color:var(--gold); font-weight:800; font-size:11px}
.papers ul{list-style:none; margin:7px 0 2px; padding:0; display:flex; flex-direction:column; gap:6px}
.paper{display:flex; gap:8px; padding:6px 9px; background:var(--bg); border:1px solid var(--line); border-radius:8px}
.paper.hit{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold)}
.ptime{flex:0 0 56px; font-size:11.5px; color:var(--ink2); font-variant-numeric:tabular-nums; padding-top:1px}
.pthumb{flex:0 0 76px; width:76px; height:48px; object-fit:cover; border-radius:5px; border:1px solid var(--line); background:#fff}
.pbody{display:block}
.ptitle{display:block; font-weight:600; font-size:12.5px; line-height:1.35}
.pauth{display:block; color:var(--ink2); font-size:11.5px; margin-top:2px}
.ptag{display:inline-block; border:1px solid var(--line); border-radius:4px; padding:0 5px; margin:0 0 0 4px; font-size:10px; color:var(--ink2); background:var(--card)}
a.offlink{color:inherit; text-decoration:none}
a.offlink:hover{text-decoration:underline}
.ext{font-size:10px; color:var(--teal2); margin-left:3px; vertical-align:super}
  .empty{padding:40px 10px; text-align:center; color:var(--ink2); font-size:14px}
  .agendabar{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:14px; box-shadow:var(--shadow); display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .agendabar .cnt{font-weight:800; color:var(--teal); font-size:14px; margin-right:auto}
  .btn{border:none; border-radius:9px; padding:9px 14px; font-size:13.5px; font-weight:700; cursor:pointer}
  .btn.primary{background:var(--teal); color:#f4efe6}
  .btn.ghost{background:transparent; border:1.5px solid var(--teal); color:var(--teal)}
  .remsel{padding:8px 8px; border:1px solid var(--line); border-radius:9px; font-size:13px; background:#fff; color:var(--ink)}
  .note{font-size:12px; color:var(--ink2); margin-top:10px; padding:0 4px}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13.5px; opacity:0; pointer-events:none; transition:opacity .25s; z-index:99; max-width:92vw; text-align:center}
  .toast.show{opacity:.96}
  @media (max-width:560px){
    .tcol{flex-basis:60px}
    .gcal span{display:none}
    .dayhead{top:150px}
  }
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <h1>SIGGRAPH 2026 · My Schedule Planner
      <span class="sub">Los Angeles Convention Center · July 19–23, 2026 · all times PDT</span>
    </h1>
  </div>
  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
  </div>
</header>

<div class="controls">

  <div class="trange" title="show only sessions ending inside this window">
    <span class="trlabel" id="trlabel"></span>
    <div class="trslider">
      <div class="trfill" id="trfill"></div>
      <input type="range" id="tlo" min="16" max="40" value="16" step="1" aria-label="earliest end time">
      <input type="range" id="thi" min="16" max="40" value="40" step="1" aria-label="latest end time">
    </div>
  </div>
</div>
<div class="kwrow" id="kwrow">
  <span class="kwlabel">Paper keywords</span>
  <span class="kwall"><a id="kwAll">All</a> | <a id="kwNone">None</a></span>
  <span id="kwchips"></span>
  <span class="kwcount" id="kwcount"></span>
</div>

<main id="main"></main>
<div class="toast" id="toast"></div>

// ---- end-time range filter (slider steps = half hours, 16=8:00am .. 40=8:00pm) ----
const TMIN=16, TMAX=40;
let tLo=TMIN, tHi=TMAX;
const timeActive = ()=> tLo>TMIN || tHi<TMAX;
function timeOk(s){
  if(!timeActive()) return true;
  const [h,m] = s.end.split(":").map(Number);
  const e = h*60+m;
  if(tLo>TMIN && e < tLo*30) return false;   // extremes act as unbounded:
  if(tHi<TMAX && e > tHi*30) return false;   // full range shows everything
  return true;
}
function fmtSlot(v){ return fmt12(Math.floor(v/2)+":"+(v%2?"30":"00")); }

  const lab = document.getElementById("trlabel");
  lab.textContent = "ends "+(tLo===TMIN?"8:00am":fmtSlot(tLo))+" – "+(tHi===TMAX?"8:00pm+":fmtSlot(tHi));
  lab.classList.toggle("active", timeActive());
  const span = TMAX-TMIN;
  const fill = document.getElementById("trfill");
  fill.style.left = ((tLo-TMIN)/span*100)+"%";
  fill.style.right = ((TMAX-tHi)/span*100)+"%";

thiEl.oninput = e=>{ tHi = Math.max(+e.target.value, tLo); e.target.value = tHi; syncTr(); render(); };

// ---- fuzzy text search ----
function normStr(x){ return x.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,""); }
function words(x){ return normStr(x).split(/[^a-z0-9]+/).filter(Boolean); }
// bounded optimal-string-alignment distance (Levenshtein + adjacent transposition)
function editLe(a,b,max){
  const la=a.length, lb=b.length;
  if(Math.abs(la-lb)>max) return false;
  let prev2=null, prev=Array.from({length:lb+1},(_,j)=>j);
  for(let i=1;i<=la;i++){
    const cur=new Array(lb+1); cur[0]=i; let rowMin=i;
    for(let j=1;j<=lb;j++){
      const cost = a[i-1]===b[j-1]?0:1;
      let v = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
      if(prev2 && i>1 && j>1 && a[i-1]===b[j-2] && a[i-2]===b[j-1]) v=Math.min(v, prev2[j-2]+1);
      cur[j]=v; if(v<rowMin) rowMin=v;
    }
    if(rowMin>max) return false;
    prev2=prev; prev=cur;
  }
  return prev[lb]<=max;
}
function tokHit(t, ws){
  const tol = t.length>=9?2 : t.length>=5?1 : 0;
  for(const w of ws){
    if(w.includes(t)) return true;
    if(!tol) continue;
    if(editLe(t,w,tol)) return true;
    if(w.length>t.length && editLe(t, w.slice(0,t.length+1), tol)) return true; // prefix-fuzzy
  }
  return false;
}
function sessWords(s){
  return s._w || (s._w = words([s.title,s.who,s.loc,s.type,s.chair||"",
    ...(s.papers||[]).map(p=>p.t+" "+p.a+" "+(p.p||""))].join(" ")));
}
function paperWords(p){ return p._w || (p._w = words(p.t+" "+p.a+" "+(p.p||""))); }
function paperTextMatch(p){ return qt.length>0 && qt.every(t=>tokHit(t, paperWords(p))); }

// ---- paper keyword filter ----
const KWABBR = {"Artificial Intelligence/Machine Learning":"AI/ML"};
const ALLKW = [...new Set(SESSIONS.flatMap(s=>(s.papers||[]).flatMap(p=>p.k||[])))].sort();
let kwSel = new Set(ALLKW);
const kwActive = ()=> kwSel.size < ALLKW.length;
function kwMatch(p){ return !!(p.k && p.k.some(k=>kwSel.has(k))); }
function paperHit(p){
  const qh = paperTextMatch(p);
  const kh = kwActive() && kwMatch(p);
  if(qt.length && kwActive()) return !!(qh && kh);
  return !!(qh || kh);
}
function renderKws(){
  const box = document.getElementById("kwchips");
  box.innerHTML = "";
  for(const k of ALLKW){
    const b = document.createElement("span");
    b.className = "kwchip"+(kwSel.has(k)?" on":"");
    b.textContent = KWABBR[k]||k;
    b.title = k;
    b.onclick = ()=>{ if(kwSel.has(k)) kwSel.delete(k); else kwSel.add(k); render(); };
    box.appendChild(b);
  }
  const tot = SESSIONS.reduce((n,s)=>n+(s.papers?s.papers.length:0),0);
  let n = tot;
  if(kwActive()||qt.length){
    n = 0;
    for(const s of SESSIONS) for(const p of (s.papers||[])){
      if(kwActive() && !kwMatch(p)) continue;
      if(qt.length && !paperTextMatch(p)) continue;
      n++;
    }
  }
  document.getElementById("kwcount").textContent = `${n} of ${tot} papers`;
}
document.getElementById("kwAll").onclick = ()=>{ kwSel = new Set(ALLKW); render(); };
document.getElementById("kwNone").onclick = ()=>{ kwSel = new Set(); render(); };

function matches(s){
  if(typef && s.type.split(",")[0].trim()!==typef) return false;
  if(!timeOk(s)) return false;
  if(kwActive() && !(s.papers && s.papers.some(kwMatch))) return false;
  if(qt.length) return qt.every(t=>tokHit(t, sessWords(s)));
  return true;
}

function fmt12(hm){
  let [h,m] = hm.split(":").map(Number);
  const ap = h>=12?"pm":"am"; h = h%12||12;
  return h+":"+String(m).padStart(2,"0")+ap;
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

const OFFBASE = "https://s2026.conference-schedule.org/";
function sessURL(s){ return s.sid ? OFFBASE+"?post_type=page&p=16&sess="+s.sid : null; }
function paperURL(s,p){ return (s.sid && p.id) ? OFFBASE+"?post_type=page&p=15&id="+p.id+"&sess="+s.sid : null; }

function paperLines(s){
  if(!s.papers) return "";
  return s.papers.map(p=>fmt12(p.s)+" "+p.t+(p.p?" ("+p.p+")":"")).join("\n");
}
function gcalLink(s){
  const d = s.date.replace(/-/g,"");
  const dates = d+"T"+s.start.replace(":","")+"00/"+d+"T"+s.end.replace(":","")+"00";
  const pl = paperLines(s);
  const p = new URLSearchParams({action:"TEMPLATE", text:"SIGGRAPH: "+s.title, dates,
    ctz:"America/Los_Angeles", location:s.loc+", SIGGRAPH 2026, Los Angeles",
    details:(s.type?("["+s.type+"] "):"")+(s.who?("Speakers: "+s.who+"\n"):"")+(pl?"Papers:\n"+pl+"\n":"")+"Pinned via my SIGGRAPH 2026 planner"});
  return "https://calendar.google.com/calendar/render?"+p.toString();
}

// conflict detection among pinned sessions (same day, overlapping times)
function conflicts(){
  const byDay = {};
  const pinnedSessions = SESSIONS.filter(s=>pinned.has(s.id));
  for(const s of pinnedSessions) (byDay[s.day]=byDay[s.day]||[]).push(s);
  const conf = new Set();
  for(const day in byDay){
    const arr = byDay[day];
    for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
      const a=arr[i], b=arr[j];
      if(a.start < b.end && b.start < a.end){ conf.add(a.id); conf.add(b.id); }
    }
  }
  return conf;
}

function papersBlock(s){
  const anyHit = s.papers.some(paperHit);
  const items = s.papers.map(p=>{
    const hit = paperHit(p);
    const tags = p.k ? `<span class="ptags">${p.k.map(k=>`<span class="ptag">${esc(KWABBR[k]||k)}</span>`).join("")}</span>` : "";
    return `<li class="paper${hit?" hit":""}">
      <span class="ptime">${fmt12(p.s)}</span>
      ${p.img?`<img class="pthumb" loading="lazy" alt="" src="data/thumbs/${p.img}">`:""}
      <span class="pbody"><span class="ptitle">${paperURL(s,p)?`<a class="offlink" target="_blank" rel="noopener" title="open on the official schedule" href="${paperURL(s,p)}">${esc(p.t)}<span class="ext">↗</span></a>`:esc(p.t)}</span>
      <span class="pauth">${esc(p.a)}${p.p?` · <b>presenter: ${esc(p.p)}</b>`:""}${tags}</span></span></li>`;
  }).join("");
  return `<details class="papers"${anyHit?" open":""}>
    <summary>📄 ${s.papers.length} paper${s.papers.length!==1?"s":""}${s.chair?` · chair: ${esc(s.chair)}`:""}${anyHit?' <span class="phit">match inside</span>':""}</summary>
    <ul>${items}</ul></details>`;
}

function card(s, confSet){
  const on = pinned.has(s.id);
  const div = document.createElement("div");
  div.className = "card"+(on?" pinned":"");
  div.id = "c_"+s.id;
  div.innerHTML = `
    <div class="tcol"><b>${fmt12(s.start)}</b>– ${fmt12(s.end)}</div>
    <div class="mid">
      <span class="badge" style="background:${typeColor(s.type)}">${esc(s.type.split(",")[0].trim())}</span>
      <div class="title">${s.sid?`<a class="offlink" target="_blank" rel="noopener" title="open on the official schedule" href="${sessURL(s)}">${esc(s.title)}<span class="ext">↗</span></a>`:esc(s.title)}</div>
      ${s.who?`<div class="who">${esc(s.who)}</div>`:""}
      <div class="loc">📍 ${esc(s.loc)}</div>
      ${s.papers?papersBlock(s):""}
      ${confSet && confSet.has(s.id)?'<div class="conflict">⚠ overlaps another pinned session</div>':""}
    </div>
    <div class="acts">
      <button class="pinbtn ${on?"on":""}" title="${on?"Unpin":"Pin"}" aria-label="pin">${on?"★":"☆"}</button>
      <a class="gcal" target="_blank" rel="noopener" href="${gcalLink(s)}">📅 <span>GCal</span></a>
    </div>`;
  div.querySelector(".pinbtn").onclick = ()=>{
    if(pinned.has(s.id)) pinned.delete(s.id); else pinned.add(s.id);
    savePins(); render();
  };
  return div;
}

function daySection(day, list, confSet){
  const sec = document.createElement("section");
  sec.className = "daysec";
  const h = document.createElement("div");
  h.className = "dayhead";
  h.innerHTML = `<span>${DAYNUM[day]}</span><small>${list.length} session${list.length!==1?"s":""}</small>`;
  sec.appendChild(h);
  for(const s of list) sec.appendChild(card(s, confSet));
  return sec;
}

function render(){
  renderTabs();
  renderKws();
  const main = document.getElementById("main");
  main.innerHTML = "";
  const confSet = conflicts();

  if(view==="Overview"){
    const bar = document.createElement("div");
    bar.className = "agendabar";
    bar.innerHTML = `
      <span class="cnt">▤ Sessions per day</span>
      <label style="font-size:12.5px;color:var(--ink2)">Program:
        <select class="remsel" id="ovsel"></select>
      </label>
      <span style="font-size:11.5px;color:var(--ink2)">tap a session to open its day · ★ pins it</span>`;
    main.appendChild(bar);
    const sel = bar.querySelector("#ovsel");
    for(const t of typeSet){ const o=document.createElement("option"); o.value=o.textContent=t; if(t===ovType) o.selected=true; sel.appendChild(o); }
    sel.onchange = e=>{ ovType=e.target.value; render(); };

    const wrap = document.createElement("div");
    wrap.className = "ovwrap";
    let anyCol = false;
    for(const day of DAYS){
      let list = SESSIONS.filter(s=>s.day===day && s.type.split(",")[0].trim()===ovType && timeOk(s));
      if(ovType==="Technical Paper" && kwActive()) list = list.filter(s=>s.papers && s.papers.some(kwMatch));
      if(!list.length) continue;
      anyCol = true;
      const col = document.createElement("div");
      col.className = "ovcol";
      col.innerHTML = `<div class="ovhead"><span>${day.slice(0,3).toUpperCase()}</span><span>${DAYNUM[day].split(", ")[1]}</span></div>`;
      for(const s of list){
        const it = document.createElement("div");
        it.className = "ovitem"+(pinned.has(s.id)?" pinned":"");
        const kwN = (ovType==="Technical Paper" && kwActive() && s.papers) ? s.papers.filter(kwMatch).length : 0;
        it.innerHTML = `<span class="ovstar" title="pin">${pinned.has(s.id)?"★":"☆"}</span>
          <span class="ovtime">${fmt12(s.start)}–${fmt12(s.end)}</span>
          <div class="ovtitle">${esc(s.title)}</div>
          ${kwN?`<div class="ovkw">${kwN} matching paper${kwN!==1?"s":""}</div>`:""}`;
        it.querySelector(".ovstar").onclick = ev=>{
          ev.stopPropagation();
          if(pinned.has(s.id)) pinned.delete(s.id); else pinned.add(s.id);
          savePins(); render();
        };
        it.onclick = ()=>{
          view = s.day; render();
          const el = document.getElementById("c_"+s.id);
          if(el){ el.scrollIntoView({block:"center"}); el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1600); }
        };
        col.appendChild(it);
      }
      wrap.appendChild(col);
    }
    if(!anyCol){ const e=document.createElement("div"); e.className="empty"; e.textContent="No sessions in this category."; main.appendChild(e); }
    else main.appendChild(wrap);
    return;
  }

  if(view==="Agenda"){
    const bar = document.createElement("div");
    bar.className = "agendabar";
    bar.innerHTML = `
      <span class="cnt">★ ${pinned.size} pinned</span>
      <label style="font-size:12.5px;color:var(--ink2)">Reminder:
        <select class="remsel" id="remsel">
          <option value="10">10 min before</option>
          <option value="15" selected>15 min before</option>
          <option value="30">30 min before</option>
          <option value="60">1 hour before</option>
          <option value="0">none</option>
        </select>
      </label>
      <button class="btn primary" id="dlics">⬇ Export .ics for Google Calendar</button>`;
    main.appendChild(bar);
    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "Import the .ics at calendar.google.com → ⚙ Settings → Import & export (or open it on iPhone/Android). Events land in Pacific time with your chosen reminder, so your phone notifies you automatically. The 📅 GCal button on any card adds just that one session.";
    main.appendChild(note);

    const mine = SESSIONS.filter(s=>pinned.has(s.id));
    if(mine.length===0){ const e=document.createElement("div"); e.className="empty"; e.textContent="Nothing pinned yet — tap ☆ on any session."; main.appendChild(e); }
    for(const day of DAYS){
      const list = mine.filter(s=>s.day===day);
      if(list.length) main.appendChild(daySection(day, list, confSet));
    }
    document.getElementById("dlics").onclick = downloadICS;
    return;
  }

  const days = view==="All" ? DAYS : [view];
  let any = false;
  for(const day of days){
    const list = SESSIONS.filter(s=>s.day===day && matches(s));
    if(list.length){ any=true; main.appendChild(daySection(day, list, confSet)); }
  }
  if(!any){ const e=document.createElement("div"); e.className="empty"; e.textContent="No sessions match."; main.appendChild(e); }
}

// ---- ICS export ----
function icsEsc(s){ return s.replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }
function foldLine(line){
  let out=""; while(line.length>73){ out+=line.slice(0,73)+"\r\n "; line=line.slice(73); } return out+line;
}
function downloadICS(){
  const rem = document.getElementById("remsel").value;
  const mine = SESSIONS.filter(s=>pinned.has(s.id));
  if(!mine.length){ toast("Pin some sessions first!"); return; }
  let L = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//SIGGRAPH2026 Personal Planner//EN",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "X-WR-CALNAME:SIGGRAPH 2026 (my sessions)","X-WR-TIMEZONE:America/Los_Angeles",
    "BEGIN:VTIMEZONE","TZID:America/Los_Angeles",
    "BEGIN:DAYLIGHT","TZOFFSETFROM:-0800","TZOFFSETTO:-0700","TZNAME:PDT","DTSTART:19700308T020000","RRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=2SU","END:DAYLIGHT",
    "BEGIN:STANDARD","TZOFFSETFROM:-0700","TZOFFSETTO:-0800","TZNAME:PST","DTSTART:19701101T020000","RRULE:FREQ=YEARLY;BYMONTH=11;BYDAY=1SU","END:STANDARD",
    "END:VTIMEZONE"
  ];
  for(const s of mine){
    const d = s.date.replace(/-/g,"");
    L.push("BEGIN:VEVENT");
    L.push("UID:sig26-"+s.id+"@siggraph2026.planner");
    L.push("DTSTAMP:20260701T000000Z");
    L.push("DTSTART;TZID=America/Los_Angeles:"+d+"T"+s.start.replace(":","")+"00");
    L.push("DTEND;TZID=America/Los_Angeles:"+d+"T"+s.end.replace(":","")+"00");
    L.push(foldLine("SUMMARY:"+icsEsc("SIGGRAPH: "+s.title)));
    L.push(foldLine("LOCATION:"+icsEsc(s.loc+", SIGGRAPH 2026, Los Angeles")));
    const pl = paperLines(s);
    L.push(foldLine("DESCRIPTION:"+icsEsc("["+s.type+"]"+(s.who?" Speakers: "+s.who:"")+(pl?"\nPapers:\n"+pl:""))));
    if(rem!=="0"){
      L.push("BEGIN:VALARM","ACTION:DISPLAY",foldLine("DESCRIPTION:"+icsEsc("Starting soon: "+s.title)),"TRIGGER:-PT"+rem+"M","END:VALARM");
    }
    L.push("END:VEVENT");
  }
  L.push("END:VCALENDAR");
  const blob = new Blob([L.join("\r\n")], {type:"text/calendar;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "siggraph2026_my_sessions.ics";
  document.body.appendChild(a); a.click(); a.remove();
  toast(`Downloaded ${mine.length} sessions — import into Google Calendar and reminders are set.`);
}

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 4200);
}

render();
</script>
